<svg width="240" height="64" viewBox="0 0 240 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="touchlineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ED573"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>

  <g fill="none" fill-rule="evenodd">
    <!-- Awareness Arc -->
    <path d="M24 44 C32 8, 80 8, 88 44"
          stroke="url(#touchlineGradient)"
          stroke-width="4"
          stroke-linecap="round"/>

    <!-- Touchline -->
    <line x1="12" y1="44" x2="100" y2="44"
          stroke="#2ED573"
          stroke-width="3.5"
          stroke-linecap="round"/>

    <!-- Decision Node -->
    <circle cx="56" cy="44" r="5" fill="#2ED573"/>

    <!-- Wordmark -->
    <text x="116" y="46"
          font-family="Inter, system-ui, sans-serif"
          font-size="28"
          font-weight="600"
          fill="#F5F7FA">
      Touchline
    </text>
  </g>
</svg>
